name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 20
    env:
      CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/.build/module-cache/clang
      SWIFTPM_MODULECACHE_OVERRIDE: ${{ github.workspace }}/.build/module-cache/swiftpm
      SWIFT_MODULECACHE_PATH: ${{ github.workspace }}/.build/module-cache/swift
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Show toolchain
        run: swift --version

      - name: Run repository checks
        run: bash Scripts/check.sh

      - name: Package local application
        run: bash Scripts/package-app.sh

      - name: Validate packaged application
        run: |
          test -x dist/MarkdownLiteMac.app/Contents/MacOS/MarkdownLiteMac
          plutil -lint dist/MarkdownLiteMac.app/Contents/Info.plist
          test "$(plutil -extract CFBundleShortVersionString raw -o - dist/MarkdownLiteMac.app/Contents/Info.plist)" = "0.6.0"
          test "$(plutil -extract CFBundleVersion raw -o - dist/MarkdownLiteMac.app/Contents/Info.plist)" = "6"
          codesign --verify --deep --strict dist/MarkdownLiteMac.app
