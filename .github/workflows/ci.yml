name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 20
    env:
      CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/.build/module-cache/clang
      SWIFTPM_MODULECACHE_OVERRIDE: ${{ github.workspace }}/.build/module-cache/swiftpm
      SWIFT_MODULECACHE_PATH: ${{ github.workspace }}/.build/module-cache/swift
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Show toolchain
        run: swift --version

      - name: Run repository checks
        run: bash Scripts/check.sh

      - name: Package local application
        run: bash Scripts/package-app.sh

      - name: Validate packaged application
        run: |
          source_version="$(plutil -extract CFBundleShortVersionString raw -o - Support/Info.plist)"
          source_build="$(plutil -extract CFBundleVersion raw -o - Support/Info.plist)"
          [[ "$source_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$source_build" =~ ^[0-9]+$ ]]
          test ! -e dist/MarkdownLiteMac.app
          test -x dist/Mojian.app/Contents/MacOS/MarkdownLiteMac
          plutil -lint dist/Mojian.app/Contents/Info.plist
          test "$(plutil -extract CFBundleDisplayName raw -o - dist/Mojian.app/Contents/Info.plist)" = "墨简"
          test "$(plutil -extract CFBundleName raw -o - dist/Mojian.app/Contents/Info.plist)" = "墨简"
          test "$(plutil -extract CFBundleExecutable raw -o - dist/Mojian.app/Contents/Info.plist)" = "MarkdownLiteMac"
          test "$(plutil -extract CFBundleIdentifier raw -o - dist/Mojian.app/Contents/Info.plist)" = "cn.nemoob.markdown-lite-mac"
          test "$(plutil -extract CFBundleShortVersionString raw -o - dist/Mojian.app/Contents/Info.plist)" = "$source_version"
          test "$(plutil -extract CFBundleVersion raw -o - dist/Mojian.app/Contents/Info.plist)" = "$source_build"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            test "$GITHUB_REF_NAME" = "v$source_version"
          fi
          codesign --verify --deep --strict dist/Mojian.app
